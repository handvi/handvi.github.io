<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H'and'V Portfolio</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden;
        }
        .bg {
            background-image: url('https://source.unsplash.com/1600x900/?cybersecurity,programming');
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: none;
        }
        .overlay {
            background-color: rgba(0, 0, 0, 0.5);
            height: 100%;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .loading-animation {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: space-around;
            width: 100px;
        }
        .loading-animation div {
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.2s infinite ease-in-out both;
        }
        .loading-animation div:nth-child(1) {
            animation-delay: -0.32s;
        }
        .loading-animation div:nth-child(2) {
            animation-delay: -0.16s;
        }
        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }
        .social-icons {
            margin-top: 20px;
        }
        .social-icons a {
            color: white;
            font-size: 2rem;
            margin: 0 15px;
            transition: color 0.3s;
        }
        .social-icons a:hover {
            color: #007bff;
        }
    </style>
</head>
<body>
    <div class="loading-animation">
        <div></div>
        <div></div>
        <div></div>
    </div>
    <div class="bg">
        <div class="overlay">
            <h1 class="display-4">H'and'V</h1>
            <p class="lead">JavaScript and Python Programmer</p>
            <p class="lead">Cyber Security Enthusiast</p>
            <div class="social-icons">
                <a href="https://github.com/handvi" target="_blank">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://twitter.com/handvi" target="_blank">
                    <i class="fab fa-twitter"></i> <!-- New -->
                </a>
                <a href="https://handvi.medium.com/" target="_blank">
                    <i class="fab fa-medium"></i>
                </a>
                <a href="https://t.me/@handviii" target="_blank">
                    <i class="fab fa-telegram"></i>
                </a>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            setTimeout(() => {
                document.querySelector(".loading-animation").style.display = "none";
                document.querySelector(".bg").style.display = "block";
                document.body.style.overflow = "auto"; // Enable scrolling after loading
            }, 3000);
        });
    </script>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
